<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Name And Lastname</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4f1ea;
        --text: #1f1a17;
        --accent: #b25b2a;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, #f4f1ea 0%, #e8dcc8 100%);
        font-family: Georgia, "Times New Roman", serif;
        color: var(--text);
      }
      main {
        padding: 3rem;
        border: 1px solid rgba(31, 26, 23, 0.12);
        background: rgba(255, 255, 255, 0.72);
        box-shadow: 0 20px 50px rgba(31, 26, 23, 0.12);
        text-align: center;
      }
      h1 {
        margin: 0 0 1rem;
        font-size: clamp(2rem, 6vw, 4rem);
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      p {
        margin: 0;
        font-size: 1.1rem;
      }
      .accent {
        color: var(--accent);
      }
    </style>
  </head>
  <body>
    <main>
      <p class="accent">AWS Static Website Hosting</p>
      <h1>Name And Lastname</h1>
      <p>Hosted on Amazon S3</p>
    </main>
  </body>
</html>
